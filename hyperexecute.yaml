version: 0.1

runson: win

project:
  name: Playwright-HyperExecute
  version: 1.0

autosplit: true
concurrency: 2

retryOnFailure: true
maxRetries: 1

globalTimeout: 600
testSuiteTimeout: 600

env:
  LT_USERNAME: ${LT_USERNAME}
  LT_ACCESS_KEY: ${LT_ACCESS_KEY}

pre:
  - echo "Installing Dependencies"
  - npm install
  - npx playwright install

cacheKey: '{{ checksum "package-lock.json" }}'

cacheDirectories:
  - node_modules

testDiscovery:
  type: raw
  mode: dynamic
  command: |
    dir /b tests\*.spec.js

testRunnerCommand: |
  echo "Running test -> $test"
  npx playwright test $test --config=playwright.config.js

report: true

partialReports:
  location: playwright-report
  type: html

artifacts:
  upload:
    - name: playwright-report
      path:
        - playwright-report

jobLabel:
  - playwright
  - hyperexecute
  - certification