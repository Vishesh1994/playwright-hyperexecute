version: 0.1

runson: win

project:
  name: Playwright-HyperExecute
  version: 1.0

autosplit: true
concurrency: 2

retryOnFailure: true
maxRetries: 1

globalTimeout: 150
testSuiteTimeout: 150

pre:
  - echo "Installing Dependencies"
  - npm install
  - npx playwright install

cacheKey: '{{ checksum "package-lock.json" }}'

cacheDirectories:
  - node_modules

testDiscovery:
  type: raw
  mode: dynamic
  command: |
    dir /b tests\*.spec.js

testRunnerCommand: |
  echo "Running test -> $test"
  npx playwright test $test --reporter=line

artifacts:
  upload:
    - playwright-report/**
    - test-results/**

jobLabel:
  - playwright
  - hyperexecute
  - certification